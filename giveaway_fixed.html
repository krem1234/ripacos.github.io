<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ripacos Giveaway - Coming Soon</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Νέο, βελτιωμένο styling για κεντράρισμα */
    .giveaway-hero {
      display: flex; /* Κάνουμε τον γονέα flex */
      align-items: center; /* Κεντράρισμα κατακόρυφα */
      justify-content: center; /* Κεντράρισμα οριζόντια */
      min-height: 80vh; /* Δίνουμε ένα ελάχιστο ύψος για να έχει χώρο να κεντραριστεί */
    }

    .maintenance-content {
      text-align: center;
      padding: 60px 20px;
    }
    .status-emoji {
      font-size: 4rem;
      margin-bottom: 20px;
      display: block;
    }
    .social-btn {
      display: inline-block;
      background: #f0ad4e;
      color: #000;
      padding: 15px 30px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: bold;
      font-size: 1.2rem;
      transition: transform 0.3s ease;
      margin-top: 20px;
    }
    .social-btn:hover {
      transform: scale(1.1);
      background: #ffc107;
    }
    .sub-text {
      color: #ccc;
      margin-top: 10px;
    }
  </style>
</head>
<body>
<div class="layout">

  <aside class="sidebar">
    <div class="logo-area">
      <img src="image1.png" alt="SlotsCore Logo">
      <span>Ripacos</span>
    </div>
    <ul>
      <li><a href="index.html">🏠 Home</a></li>
      <li><a href="bonus.html">🎁 Bonuses</a></li>
      <li class="active"><a href="giveaway_fixed.html">🤑 Giveaway</a></li>
    </ul>
  </aside>

  <main class="content">
    <section class="giveaway-hero">
      <div class="giveaway-hero-inner">
        <div class="maintenance-content">
          <span class="status-emoji">⏳</span>
          <h1>Δεν υπάρχει τρέχον giveaway αυτή τη στιγμή!</h1>
          <p style="font-size: 1.3rem;">
            Μην αγχώνεσαι όμως... Μαγειρεύουμε ήδη το επόμενο και θα είναι <strong>ΤΕΡΑΣΤΙΟ!</strong> 
          </p>
          
          <p class="sub-text">Μέχρι τότε, κάνε μας ένα follow για να μη χάσεις το launch:</p>
          
          <a href="https://www.instagram.com/ripacos/" 
             target="_blank" 
             class="social-btn">
             📸 Follow on Instagram
          </a>

          <p style="margin-top: 40px; font-weight: bold; color: #f0ad4e;">
            Μείνε συντονισμένος, δεν θα αργήσει! 🚀
          </p>
        </div>
      </div>
    </section>
  </main>

</div>
</body>
</html>
